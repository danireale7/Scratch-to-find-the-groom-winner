<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scratch Reveal</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Georgia, serif;
    background: #ffffff;
    text-align: center;
    color: #2c2c2c;
    margin: 0;
    font-family: Georgia, serif;
    text-align: center;
    color: #2c2c2c;

    /* Full screen background */
    background-image: url("background.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    /* Center content */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Soft overlay */
body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 250, 243, 0.10);
    z-index: -1;
    
}

/* Main title */
h1 {
    margin-top: 25px;
    font-size: 32px;
    font-family: 'Dancing Script', cursive;
    color: #b89b3c;
    text-shadow: 2px 2px 6px rgba(255,255,255,0.9);
}

/* Container controls size */
.container {
    position: relative;
    width: 320px;
    height: 320px;
    margin: 30px auto 10px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    border: 1.5px solid #e6c76e;
}

/* Image fits perfectly */
.container img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* THIS fixes “too big” / weird scaling */
    display: block;
}

/* Canvas overlays image */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* Bottom text */
.subtitle {
    font-size: 18px;
    margin-top: 15px;
    background: rgba(255,255,255,0.65);
    display: inline-block;
    padding: 8px 18px;
    border-radius: 14px;
}

.subtitle span {
    display: block;
    font-family: 'Dancing Script', cursive;
    font-size: 28px;
    color: #b89b3c;
    margin-bottom: 5px;
    text-shadow: 2px 2px 6px rgba(255,255,255,0.9);
}
</style>
</head>

<body>

<h1>Scratch to Reveal!</h1>

<div class="subtitle">
    <span>Did you find the groom?</span>
</div>

<div class="container">
    <img id="result" src="frank.jpg" />
    <canvas id="scratch"></canvas>
</div>
<div class="subtitle">
    <span>Proudly coded and made by Danielle</span>
</div>

<script>
const canvas = document.getElementById("scratch");
const ctx = canvas.getContext("2d");
const container = document.querySelector(".container");

function resizeCanvas() {
    canvas.width = container.offsetWidth;
    canvas.height = container.offsetHeight;

    ctx.fillStyle = "#b89b3c";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.globalCompositeOperation = "destination-out";
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let isDrawing = false;

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
        y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top
    };
}

function scratch(e) {
    if (!isDrawing) return;
    e.preventDefault();

    const pos = getPos(e);
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 22, 0, Math.PI * 2);
    ctx.fill();
}

canvas.addEventListener("mousedown", () => isDrawing = true);
canvas.addEventListener("mouseup", () => isDrawing = false);
canvas.addEventListener("mousemove", scratch);

canvas.addEventListener("touchstart", () => isDrawing = true);
canvas.addEventListener("touchend", () => isDrawing = false);
canvas.addEventListener("touchmove", scratch);
</script>

</body>
</html>
